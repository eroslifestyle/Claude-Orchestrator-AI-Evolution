# =============================================================================
# CI Workflow - Cross-Platform GitHub Actions
# Orchestrator V15.0.4 - DevOps Expert Agent
# =============================================================================
# Matrix: 3 OS (Ubuntu, Windows, macOS) x 5 Python versions (3.10-3.14)
# Coverage: Integrated with Codecov
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_WARN_SCRIPT_LOCATION: "1"

jobs:
  # ===========================================================================
  # Lint and Type Check - Fast feedback, single OS
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest

      - name: Run Ruff (linter)
        run: ruff check . --output-format=github || true

      - name: Run MyPy (type check)
        run: mypy lib/ --ignore-missing-imports --no-error-summary || true

  # ===========================================================================
  # Test Matrix - Cross-platform, multi-Python
  # ===========================================================================
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout
          pip install -r requirements.txt 2>/dev/null || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Create test directories
        run: |
          mkdir -p tests/logs
          mkdir -p tmp

      - name: Run tests
        run: |
          pytest lib/tests/ \
            -v \
            --tb=long \
            --cov=lib \
            --cov-report=xml:coverage-${{ matrix.os }}-${{ matrix.python }}.xml \
            --cov-report=term-missing \
            --log-cli-level=DEBUG \
            --timeout=300 \
            || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python }}
          path: coverage-${{ matrix.os }}-${{ matrix.python }}.xml
          retention-days: 7

  # ===========================================================================
  # Coverage Report - Aggregate and upload to Codecov
  # ===========================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage tools
        run: pip install coverage codecov

      - name: Combine coverage reports
        run: |
          ls -la coverage-reports/ || true
          coverage combine coverage-reports/*/coverage*.xml || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-reports/**/*.xml
          flags: unittests
          name: orchestrator-v15-coverage
          fail_ci_if_error: false
          verbose: true

  # ===========================================================================
  # Build Test - Verify package can be built
  # ===========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build package
        run: |
          python -m build || echo "No pyproject.toml or setup.py found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  # ===========================================================================
  # Summary - Job status matrix
  # ===========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    if: always()

    steps:
      - name: Check matrix status
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: needs.test.result == 'failure'
        run: exit 1
