# =============================================================================
# Test Workflow - Extended Test Matrix with Performance Benchmarks
# Orchestrator V15.0.4 - DevOps Expert Agent
# =============================================================================
# Features:
# - Stress tests
# - Performance benchmarks
# - Memory profiling
# - Security scanning
# =============================================================================

name: Extended Tests

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_stress:
        description: 'Run stress tests'
        required: false
        default: 'true'
        type: boolean
      run_benchmarks:
        description: 'Run performance benchmarks'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ===========================================================================
  # Unit Tests - Fast, comprehensive
  # ===========================================================================
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-xdist
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run unit tests (parallel)
        run: |
          pytest lib/tests/ \
            -v \
            -n auto \
            --tb=short \
            --cov=lib \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -m "not slow and not stress"

  # ===========================================================================
  # Integration Tests - Cross-component validation
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run integration tests
        run: |
          pytest lib/tests/ \
            -v \
            --tb=long \
            --timeout=300 \
            -m "integration" \
            || echo "No integration tests found"

  # ===========================================================================
  # Stress Tests - High-load validation
  # ===========================================================================
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'schedule' || github.event.inputs.run_stress == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout memory_profiler
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run stress tests
        run: |
          pytest lib/tests/ \
            -v \
            --tb=long \
            --timeout=600 \
            -m "stress" \
            || echo "Stress tests completed with warnings"

  # ===========================================================================
  # Performance Benchmarks - Track performance regressions
  # ===========================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'schedule' || github.event.inputs.run_benchmarks == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark pytest-timeout
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run benchmarks
        run: |
          pytest lib/tests/ \
            --benchmark-only \
            --benchmark-autosave \
            --benchmark-compare=previous \
            --benchmark-compare-fail=mean:20% \
            || echo "Benchmarks completed"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30

  # ===========================================================================
  # Security Scan - Dependency and code vulnerability check
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit safety

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit --format=github || true

      - name: Run Bandit (code security)
        run: bandit -r lib/ -f github || true

      - name: Run Safety (dependency check)
        run: safety check --full-report || true

  # ===========================================================================
  # Test Summary
  # ===========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, stress-tests, benchmarks, security-scan]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Extended Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress | ${{ needs.stress-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmarks | ${{ needs.benchmarks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
